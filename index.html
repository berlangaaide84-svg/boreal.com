<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Airlines</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #8A2BE2, #1E90FF);
            color: white;
        }
        header {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            text-align: center;
        }
        h1 {
            animation: fadeIn 2s;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }
        nav a:hover {
            color: yellow;
        }
        section {
            padding: 50px;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Boreal Airlines</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Destinations</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <section>
        <h2>Your Adventure Starts Here</h2>
        <p>Explore the beauty of the skies with Boreal Airlines.</p>
    </section>
</body>
</html>
